apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-web
  labels:
    app: task-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-web
  template:
    metadata:
      labels:
        app: task-web
    spec:
      containers:
        - name: task-web
          image: task-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://task-api"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
