services:
  postgres:
    image: postgres:15-alpine
    container_name: ${POSTGRES_HOST:-taskmanager_postgres}
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  task-api:
    build:
      context: ./task-api
      dockerfile: Dockerfile.dev
    container_name: task-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
      - "${DEBUG_PORT:-5005}:5005"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:${POSTGRES_PORT_INTERNAL:-5432}/taskdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-supersecretkey123456789012345678901234567890}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      SERVER_PORT: 8080
    volumes:
      - ./task-api:/app
      - maven_cache:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy

  task-web:
    build:
      context: ./task-web
      dockerfile: Dockerfile.dev
    container_name: task-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-8080}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./task-web:/app
      - nextjs_cache:/app/.next
    depends_on:
      - task-api

volumes:
  postgres_data:
  maven_cache:
  nextjs_cache:
