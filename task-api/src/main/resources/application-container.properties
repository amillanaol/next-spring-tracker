# Production/Container Profile
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/taskdb}
server.port=8080

# JWT
jwt.secret=${JWT_SECRET:supersecretkey123456789012345678901234567890}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Logging
logging.level.com.taskmanager=DEBUG
logging.level.org.springframework.security=DEBUG

# Disable health checks for faster startup
management.endpoint.health.show-details=never
